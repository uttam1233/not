name: ipad_notes_offline
description: Offline-first iPad notes app (Apple Notes / OneNote-like) built with Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Rich text editor (WYSIWYG)
  flutter_quill: ^11.5.0

  # Local database
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0
  path_provider: ^2.1.3

  # State management
  provider: ^6.1.2

  # MUST be compatible with flutter_localizations (pinned by Flutter SDK)
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  isar_community_generator: ^3.3.0

flutter:
  uses-material-design: true